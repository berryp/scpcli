version: 2

builds:
  - id: scpcli
    main: ./cmd/scpcli
    binary: scpcli
    ldflags:
      - -s -w -X github.com/berryp/scpcli/internal/version.version={{ .Version }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: scpcli
    builds: [scpcli]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
