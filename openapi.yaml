openapi: 3.2.0
info:
    title: Samsung Cloud Platform Security Authentication API Guide
    version: "3.0"
    description: |-
        ## Overview

        We provide an Application Programming Interface (API) that supports the use of infrastructure/solution products provided by Samsung Cloud Platform.

        This guide provides a brief description of the Samsung Cloud Platform Open API and how to call API.

        The API is provided as a RESTful API, and it responds in JSON format.

        Depending on the API, you can enter parameter values and register, modify, delete, and retrieve.

        It is used through the HTTP POST/GET/PUT/DELETE method call.

        When the call fails, it returns an error code and message.

        ## Samsung Cloud Platform Open API Call Procedure
        ### Creating an Access Key

        To use the Open API function of Samsung Cloud Platform, you need to issue an access key.

        Access key issue can be checked in [My Profile] > [Access Key Management] in the console of Samsung Cloud Platform.

        The access key can be issued either a user access key (maximum 2) or a project access key (maximum 2).

        ```
        If the access key is set to 'Not In Use', the API call will fail.
        ```

        API access key pairs with Access Secret Key. The access key is used to authenticate API requests.

        1. Log in to the Samsung Cloud Platform homepage.

        2. When accessing the [My Profile] > [Access Key Management] menu, click the "Create Access Key" button.

          *If you already have an access key then you can simply use that one.

        3.Check the issued Access Key and Access Secret Key from the access key list.

        ## Calling API

        ## AUTH PARAMS

        Header : Description
        ```
        X-Cmp-AccessKey : Access Key issued by Samsung Cloud Platform Portal
        X-Cmp-Signature : Encrypted signature of the calling API request with the Access Secret Key mapped to the Access Key. HMAC encryption algorithm uses HmacSHA256
        X-Cmp-Timestamp : Defines the elapsed time in milliseconds since January 1, 1970 00:00:00 Coordinated Universal Time (UTC).
        X-Cmp-ClientType : Client Type
        X-Cmp-ProjectId : Project ID of the project you want to run the API for
        ```
        For APIs that do not require a project ID, they can only be called with a common key.

        ## AUTH PARAMS Request Example
        ```
        curl -i -X GET
        -H "X-Cmp-AccessKey:2sd2gg=2agbdSD26svcD"
        -H "X-Cmp-Signature:fsfsdf235f9U35sdgf35Xsf/qgsdgsdg326=sfsdr23rsef="
        -H "X-Cmp-Timestamp:1605290625682"
        -H "X-Cmp-ClientType:OpenApi"
        -H "X-Cmp-ProjectId:PROJECT-XXXXXXXXXXXXXXXXXXXXXX"
        'https://openapi.samsungsdscloud.com/iam/v2/access-keys'
        ```

        ## LANGUAGE PARAMS
        Header : Description
        ```
        X-Cmp-Language  : Set the language to be used when executing API (use Korean if not entered)
                          Korean : ko-KR
                          English : en-US
        ```

        ## LANGUAGE PARAMS Request Example
        ```
        curl -i -X GET
        -H "X-Cmp-AccessKey:2sd2gg=2agbdSD26svcD"
        -H "X-Cmp-Signature:fsfsdf235f9U35sdgf35Xsf/qgsdgsdg326=sfsdr23rsef="
        -H "X-Cmp-Timestamp:1605290625682"
        -H "X-Cmp-ClientType:OpenApi"
        -H "X-Cmp-ProjectId:PROJECT-XXXXXXXXXXXXXXXXXXXXXX"
        -H "X-Cmp-Language:en-US"
        'https://openapi.samsungsdscloud.com/iam/v2/access-keys'
        ```


        ## Creating a Signature

        * Generates a string to be signed from the request, encrypts it with the HmacSHA256 algorithm with the Access Secret Key, and then encodes it in Base64.

        *Use this value as x-Cmp-Signature.

        ## Sample Code (Java)
        ```java
            public static String makeHmacSignature(String method,
                                                   String url,
                                                   String timestamp,
                                                   String accessKey,
                                                   String accessSecretKey,
                                                   String headerProjectId,
                                                   String headerClientType) {

                String body = method + url + timestamp + accessKey + headerProjectId + headerClientType;

                String encodeBase64Str;

                try {
                    byte[] message = body.getBytes("UTF-8");
                    byte[] secretKey = accessSecretKey.getBytes("UTF-8");

                    Mac mac = Mac.getInstance("HmacSHA256");
                    SecretKeySpec secretKeySpec = new SecretKeySpec(secretKey, "HmacSHA256");
                    mac.init(secretKeySpec);
                    byte[] hmacSha256 = mac.doFinal(message);
                    encodeBase64Str = Base64.getEncoder().encodeToString(hmacSha256);
                } catch (Exception e) {
                    throw new RuntimeException("Failed to calculate hmac-sha256", e);
                }

                return encodeBase64Str;
            }
        ```

        ## Sample Code (JavaScript)
        ```javascript
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/hmac-sha256.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/components/enc-base64-min.js"></script>
        <script type="text/javascript">
        function makeSignature() {
            var method = "GET"; // Method
            var url = "{url}"; // url
            var timestamp = Date.now(); // timestamp
            var accessKey = "{accessKey}"; // access key
            var secretKey = "{secretKey}"; // secret key
            var projectId = "{projectId}"; // projectId
            var clientType = "openApi"; // client type

            url = encodeURI(url); // Korean, special character processing

            var message = method + url + timestamp + accessKey + projectId + clientType;

            var hash = CryptoJS.HmacSHA256(message, secretKey);
            return CryptoJS.enc.Base64.stringify(hash);
        }
        </script>
        ```

        ## Issuing a Temporary Key

        A temporary key has limited usage period and can be issued using the access key.

        Temporary keys have an expiration date of minimum 15 minutes and a maximum of 2160 minutes (36 hours).

        To issue a temporary key, you first need to request OTP using the access key.

        Temporary key can be issued by executing a temporary key issue request after the OTP.

        OTP cannot be re-requested within 1 minute, and a temporary key issue request must be made within 5 minutes after issuance.

        ## Request OTP

        To issue OTP, execute the following OpenAPI.

        If the OTP issue request is successful, the OTP will be sent to the registered medium in the account.

        ```
        Method: POST
        URL: /iam/v2/access-keys/temporarys/otp/{transmissionMethod}
        transmissionMethod: Enter the OTP issuance medium. The input value is either E-Mail or SMS.

        Ex)
        https://openapi.samsungsdscloud.com/iam/v2/access-keys/temporarys/otp/E-Mail
        https://openapi.samsungsdscloud.com/iam/v2/access-keys/temporarys/otp/SMS

        ```

        ## Creating a Temporary Key

        Execute the OPEN API below to generate a temporary key after receiving OTP.

        The temporary key can be issued by filling the body with the expiration date of the temporary key and the received OTP value.
        ```
        Method : POST
        URL : /iam/v2/access-keys/temporarys/
        Body :
        {
            "durationMinutes": "2160",
            "otp":"123456"
        }

        Ex)
        https://openapi.samsungsdscloud.com/iam/v2/access-keys/temporarys/

        Result :

        {
          "accessKey": "MJ12125+sEnCATyZ/WbE",
          "accessKeyId": "ACCESSKEY-abcdefghijklmnopqrstuv",
          "accessSecretKey": "SECRETKEY",
          "expiredDt": "2021-12-31T23:59:59.999Z",
          "accessKeyActivated": true,
          "projectId": "PROJECT-Q8ob-g8rt8pOIFpVi8Iiun",
          "projectName": "Project Name",
          "createdBy": "cmpuser@samsung.com",
          "createdDt": "2021-03-17T15:41:15.442Z",
          "modifiedBy": "cmpuser@samsung.com",
          "modifiedDt": "2021-03-17T15:41:15.442Z"
        }
        ```


        ## Processing Responses
             *For responses to product API calls, refer to the respective product guide (API Reference).

        ## Processing Errors
             *For error codes for product API calls, refer to the respective product guide (API Reference).

        ## Common Error Codes
        ```json
        {
            "service": "GW",
            "timestamp": "2021-12-21T12:11:24.461Z",
            "contactUrl": "https://cloud.samsungsds.com",
            "message": "Authentication method or IP address is not allowed.",
            "status": 401,
            "code": "PLATFORM-GW-000001",
            "path": "/iam/v2/access-keys/temporarys/otp/SMS",
            "requestId": "REQUEST-32BBA966F1DC4AE5B97AF41AA8FE3F7F"
        }
        ```

        ### Error Code

        ```
        HTTP Status Code    Error Code                       Error Message                                    Description
        400            PLATFORM-COMMON-00003              Invalid input data                                  Input validation failed
        401            PLATFORM-COMMON-00004              Unauthorized                                        Authentication failed
        401            PLATFORM-IAM-000105                Authentication method or IP address is not allowed  Access key security setting error (Check the authentication method and access IP settings in the authentication key security settings)
        401            PLATFORM-IAM-000103                Unauthorized                                        Authentication failed (Project authentication key is used for requests that require a common authentication key)
        401            PLATFORM-IAM-000104                Project id not found                                Authentication failed (Requests that require a project id do not have a project id)
        401            PLATFORM-GW-00006                  Request time out                                    Authentication failed (Valid time of timestamp used for signature creation is limited to 15 minutes after creation)
        401            PLATFORM-GW-00012                  Session expired                                     Authentication failed (Send OpenAPI request to Console address, verify request address)
        403            PLATFORM-COMMON-00008              Access denied                                       No authorization
        404            PLATFORM-GW-00002                  Access key not found                                Access key does not exist
        404            PLATFORM-COMMON-00010              Api not found                                       Target API does not exist
        404            PLATFORM-RESOURCE-GROUP-000001     Resource is already deleted or does not exist       Resource not found
        412            PLATFORM-GW-00003                  Signature does not match                            Signature mismatch authentication failed
        500            PLATFORM-COMMON-00018              Internal server error                               Error not processed as an exception
        ```
